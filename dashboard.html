<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Scan</title>

<style>
body{
  font-family:Lexend;
  padding:20px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  border:1px solid #ccc;
  padding:8px;
  text-align:left;
}
</style>
</head>

<body>

<h2>Dashboard Scan AWB</h2>

<div style="
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
justify-content:center;
">

  <div style="
  padding:15px;
  background:#f1f1f1;
  border-radius:10px;
  min-width:150px;
  ">
    <h3>Total Perjalanan</h3>
    <h1 id="totalPerjalanan">0</h1>
  </div>

  <div style="
  padding:15px;
  background:#d4ffd4;
  border-radius:10px;
  min-width:150px;
  ">
    <h3>Sudah Tiba</h3>
    <h1 id="totalTiba">0</h1>
  </div>

  <div style="
  padding:15px;
  background:#ffd4d4;
  border-radius:10px;
  min-width:150px;
  ">
    <h3>Belum Tiba</h3>
    <h1 id="belumTiba">0</h1>
  </div>

</div>
<input type="file" id="csvFile" accept=".csv">

<button onclick="uploadCSV()">
Upload CSV
</button>
  
<table>

<thead>
<tr>
  <th>Resi</th>
  <th>Status</th>
  <th>Waktu</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<script>

const SUPABASE_URL =
"https://vjxytdoybvrdgylxxqaq.supabase.co";

const SUPABASE_KEY =
"sb_publishable_MBnzcusAZqrkGnAhdDkQYA_ilUyr8mW";

async function loadData() {

  // =========================
  // AMBIL DATA MANIFEST
  // =========================

  const manifestRes = await fetch(
    `${SUPABASE_URL}/rest/v1/retur_manifest?select=*`,
    {
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: `Bearer ${SUPABASE_KEY}`
      }
    }
  );

  const manifest = await manifestRes.json();

  // =========================
  // AMBIL DATA SCAN
  // =========================

  const scanRes = await fetch(
    `${SUPABASE_URL}/rest/v1/scan_awb?select=*`,
    {
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: `Bearer ${SUPABASE_KEY}`
      }
    }
  );

  const scans = await scanRes.json();

  // =========================
  // HITUNG DASHBOARD
  // =========================

  const totalPerjalanan = manifest.length;

  const scannedResi = scans.map(s => s.resi);

  const sudahTiba = manifest.filter(m =>
    scannedResi.includes(m.resi)
  ).length;

  const belumTiba = totalPerjalanan - sudahTiba;

  // =========================
  // TAMPILKAN CARD
  // =========================

  document.getElementById("totalPerjalanan").innerText =
    totalPerjalanan;

  document.getElementById("totalTiba").innerText =
    sudahTiba;

  document.getElementById("belumTiba").innerText =
    belumTiba;

  // =========================
  // TABEL SCAN
  // =========================

  const tbody = document.getElementById("tableBody");

  tbody.innerHTML = "";

  scans.reverse().forEach(item => {

    tbody.innerHTML += `
      <tr>
        <td>${item.resi}</td>
        <td>${item.status}</td>
        <td>
          ${new Date(item.waktu).toLocaleString(
            'id-ID',
            {
              day: '2-digit',
              month: '2-digit',
              year: 'numeric',
              hour: '2-digit',
              minute: '2-digit'
            }
          )}
        </td>
      </tr>
    `;

  });

}

loadData();

async function uploadCSV() {

  const fileInput =
    document.getElementById("csvFile");

  const file = fileInput.files[0];

  if (!file) {
    alert("Pilih file CSV dulu!");
    return;
  }

  const text = await file.text();

  const rows = text.split("\n");

  // buang header
  rows.shift();

  const payload = [];

  rows.forEach(row => {

    const cols = row.split(",");

    if(cols[0]) {

      payload.push({
        resi: cols[0].trim(),
        status: cols[1]
          ? cols[1].trim()
          : "perjalanan"
      });

    }

  });

  try {

    const response = await fetch(
      `${SUPABASE_URL}/rest/v1/retur_manifest`,
      {
        method: "POST",

        headers: {
          "apikey": SUPABASE_KEY,
          "Authorization":
            `Bearer ${SUPABASE_KEY}`,
          "Content-Type":
            "application/json",
          "Prefer":
            "return=minimal"
        },

        body: JSON.stringify(payload)
      }
    );

    if(!response.ok) {

      const err =
        await response.text();

      console.log(err);

      throw new Error();

    }

    alert("CSV berhasil diupload!");

    loadData();

  } catch(err) {

    console.log(err);

    alert("Upload gagal!");

  }

}

setInterval(loadData, 3000);

</script> 
</body> 
</html>
